<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Attendance Register 2026</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  background: #0a0f1e;
  color: #c8d6e5;
  font-family: "Courier New", Courier, monospace;
  font-size: 14px;
  line-height: 1.4;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}
#save-flash {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(74, 222, 128, 0.15);
  color: #4ade80;
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  font-weight: bold;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid rgba(74, 222, 128, 0.3);
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.15s ease;
}
#save-flash.visible { opacity: 1; }
.page-header {
  padding: 16px 12px 8px 12px;
  text-align: center;
}
.page-header h1 {
  font-size: 16px;
  font-weight: bold;
  color: #e2e8f0;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.page-header .subtitle {
  font-size: 10px;
  color: #475569;
  letter-spacing: 1px;
}
.month-tabs {
  display: flex;
  gap: 0;
  padding: 8px 8px 0 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.month-tabs::-webkit-scrollbar { display: none; }
.month-tab {
  flex: 0 0 auto;
  padding: 8px 10px;
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #475569;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease;
  -webkit-appearance: none;
  outline: none;
}
.month-tab:active { color: #93c5fd; }
.month-tab.active {
  color: #93c5fd;
  border-bottom-color: #93c5fd;
}
.month-panel {
  display: none;
  padding: 10px 8px 24px 8px;
}
.month-panel.active { display: block; }
.member-card {
  background: #0d1526;
  border: 1px solid #1a2744;
  border-radius: 8px;
  margin-bottom: 10px;
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #111d33;
}
.member-name {
  font-size: 13px;
  font-weight: bold;
  color: #e2e8f0;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.member-days-tag {
  font-size: 9px;
  color: #64748b;
  font-weight: normal;
  letter-spacing: 0;
  text-transform: none;
  margin-left: 6px;
}
.totals {
  display: flex;
  gap: 10px;
  font-size: 11px;
}
.total-att { color: #4ade80; }
.total-paid { color: #f59e0b; }
.weeks-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.weeks-scroll::-webkit-scrollbar { display: none; }
.weeks-grid {
  display: inline-flex;
  gap: 2px;
  padding: 6px;
  min-width: 100%;
}
.week-col {
  background: #060d1a;
  border-radius: 4px;
  padding: 4px 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 74px;
  flex: 1 1 0;
}
.week-label {
  font-size: 9px;
  color: #334155;
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 2px;
}
.day-row {
  display: flex;
  align-items: center;
  gap: 3px;
}
.day-label {
  font-size: 8px;
  font-weight: bold;
  letter-spacing: 0.5px;
  min-width: 22px;
  text-align: right;
  flex-shrink: 0;
}
.day-label-wed { color: #93c5fd; }
.day-label-fri { color: #fcd34d; }
.day-label-tue { color: #c4b5fd; }
.day-label-thu { color: #fdba74; }
.tog {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  border: 1px solid #1a2744;
  background: #080f1e;
  color: #2a3a55;
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
  -webkit-appearance: none;
  outline: none;
  padding: 0;
  line-height: 1;
}
.tog:active { transform: scale(0.92); }
.tog.att-on {
  background: #4ade80;
  color: #0a0f1e;
  border-color: #4ade80;
  box-shadow: 0 0 6px rgba(74, 222, 128, 0.35);
}
.tog.paid-on {
  background: #f59e0b;
  color: #0a0f1e;
  border-color: #f59e0b;
  box-shadow: 0 0 6px rgba(245, 158, 11, 0.35);
}
noscript {
  display: block;
  padding: 40px 20px;
  text-align: center;
  color: #ef4444;
  font-size: 14px;
}
</style>
</head>
<body>

<div id="save-flash">&#9679; SAVED</div>

<div class="page-header">
  <h1>Attendance 2026</h1>
  <div class="subtitle">REAL CALENDAR &middot; PER-MEMBER SCHEDULES</div>
</div>

<div id="month-tabs-container" class="month-tabs"></div>
<div id="panels-container"></div>

<noscript>
  <p>JavaScript is required for this attendance register.</p>
</noscript>

<script>
(function() {
  "use strict";

  var STORAGE_KEY = "att_reg_2026_v3";
  var MEMBERS = [
    { name: "Monty",  days: [3, 5], labels: ["Wed", "Fri"] },
    { name: "Josh",   days: [3, 5], labels: ["Wed", "Fri"] },
    { name: "Fynn",   days: [3, 5], labels: ["Wed", "Fri"] },
    { name: "Gilby",  days: [3, 5], labels: ["Wed", "Fri"] },
    { name: "Callum", days: [3, 5], labels: ["Wed", "Fri"] },
    { name: "Beth",   days: [2, 4], labels: ["Tue", "Thu"] }
  ];
  var MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var YEAR = 2026;
  var saveTimer = null;
  var state = {};
  var calCache = {};

  function getMonthWeeks(monthIdx, dayA, dayB) {
    var ck = monthIdx + "-" + dayA + "-" + dayB;
    if (calCache[ck]) return calCache[ck];

    var dim = new Date(YEAR, monthIdx + 1, 0).getDate();
    var firstDow = new Date(YEAR, monthIdx, 1).getDay();
    var buckets = {};
    var d, dow, wk;

    for (d = 1; d <= dim; d++) {
      dow = new Date(YEAR, monthIdx, d).getDay();
      if (dow === dayA || dow === dayB) {
        wk = Math.floor((d + firstDow - 1) / 7);
        if (!buckets[wk]) buckets[wk] = { a: null, b: null };
        if (dow === dayA) {
          buckets[wk].a = d;
        } else {
          buckets[wk].b = d;
        }
      }
    }

    var keys = [];
    var k;
    for (k in buckets) {
      if (buckets.hasOwnProperty(k)) keys.push(parseInt(k, 10));
    }
    keys.sort(function(x, y) { return x - y; });

    var result = [];
    for (var i = 0; i < keys.length; i++) {
      result.push(buckets[keys[i]]);
    }

    calCache[ck] = result;
    return result;
  }

  function sk(mi, name, wi, slot, field) {
    return mi + "." + name + "." + wi + "." + slot + "." + field;
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var p = JSON.parse(raw);
        if (p && typeof p === "object") return p;
      }
    } catch (e) {}
    return null;
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      showSaveFlash();
    } catch (e) {}
  }

  function showSaveFlash() {
    var el = document.getElementById("save-flash");
    if (!el) return;
    el.className = "visible";
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function() { el.className = ""; }, 600);
  }

  function labelClass(memberName, slot) {
    if (memberName === "Beth") {
      return slot === "a" ? "day-label-tue" : "day-label-thu";
    }
    return slot === "a" ? "day-label-wed" : "day-label-fri";
  }

  function buildTabs() {
    var c = document.getElementById("month-tabs-container");
    if (!c) return;
    var h = "";
    for (var i = 0; i < 12; i++) {
      h += '<button class="month-tab' + (i === 0 ? " active" : "") + '" data-month="' + i + '">' + MONTH_NAMES[i] + '</button>';
    }
    c.innerHTML = h;
  }

  function buildPanels() {
    var c = document.getElementById("panels-container");
    if (!c) return;
    var h = "";
    var mi, mem, wi;

    for (mi = 0; mi < 12; mi++) {
      h += '<div class="month-panel' + (mi === 0 ? " active" : "") + '" data-month="' + mi + '">';

      for (mem = 0; mem < MEMBERS.length; mem++) {
        var m = MEMBERS[mem];
        var weeks = getMonthWeeks(mi, m.days[0], m.days[1]);
        var totalSlots = 0;

        for (wi = 0; wi < weeks.length; wi++) {
          if (weeks[wi].a !== null) totalSlots++;
          if (weeks[wi].b !== null) totalSlots++;
        }

        var aid = "ta-" + mi + "-" + mem;
        var pid = "tp-" + mi + "-" + mem;
        var tagText = m.labels[0] + " / " + m.labels[1];

        h += '<div class="member-card">';
        h += '<div class="card-header">';
        h += '<span class="member-name">' + m.name;
        h += '<span class="member-days-tag">' + tagText + '</span>';
        h += '</span>';
        h += '<div class="totals">';
        h += '<span class="total-att" id="' + aid + '">&#10003; 0/' + totalSlots + '</span>';
        h += '<span class="total-paid" id="' + pid + '">&pound; 0/' + totalSlots + '</span>';
        h += '</div></div>';

        h += '<div class="weeks-scroll"><div class="weeks-grid">';

        for (wi = 0; wi < weeks.length; wi++) {
          var wk = weeks[wi];
          h += '<div class="week-col">';
          h += '<div class="week-label">W' + (wi + 1) + '</div>';

          if (wk.a !== null) {
            var ka1 = sk(mi, m.name, wi, "a", "att");
            var ka2 = sk(mi, m.name, wi, "a", "paid");
            state[ka1] = state[ka1] || false;
            state[ka2] = state[ka2] || false;
            h += '<div class="day-row">';
            h += '<span class="day-label ' + labelClass(m.name, "a") + '">' + m.labels[0] + ' ' + wk.a + '</span>';
            h += '<button class="tog" id="btn-' + ka2 + '" data-key="' + ka2 + '" data-type="paid">&pound;</button>';
            h += '<button class="tog" id="btn-' + ka1 + '" data-key="' + ka1 + '" data-type="att">&#10003;</button>';
            h += '</div>';
          }

          if (wk.b !== null) {
            var kb1 = sk(mi, m.name, wi, "b", "att");
            var kb2 = sk(mi, m.name, wi, "b", "paid");
            state[kb1] = state[kb1] || false;
            state[kb2] = state[kb2] || false;
            h += '<div class="day-row">';
            h += '<span class="day-label ' + labelClass(m.name, "b") + '">' + m.labels[1] + ' ' + wk.b + '</span>';
            h += '<button class="tog" id="btn-' + kb2 + '" data-key="' + kb2 + '" data-type="paid">&pound;</button>';
            h += '<button class="tog" id="btn-' + kb1 + '" data-key="' + kb1 + '" data-type="att">&#10003;</button>';
            h += '</div>';
          }

          h += '</div>';
        }

        h += '</div></div></div>';
      }

      h += '</div>';
    }

    c.innerHTML = h;
  }

  function applyStateToDOM() {
    var key;
    for (key in state) {
      if (state.hasOwnProperty(key) && state[key]) {
        var btn = document.getElementById("btn-" + key);
        if (btn) {
          var t = btn.getAttribute("data-type");
          btn.className = t === "att" ? "tog att-on" : "tog paid-on";
        }
      }
    }
  }

  function updateAllTotals() {
    for (var mi = 0; mi < 12; mi++) {
      for (var mem = 0; mem < MEMBERS.length; mem++) {
        updateTotals(mi, mem);
      }
    }
  }

  function updateTotals(mi, memIdx) {
    var m = MEMBERS[memIdx];
    var weeks = getMonthWeeks(mi, m.days[0], m.days[1]);
    var ac = 0, pc = 0, ts = 0;

    for (var wi = 0; wi < weeks.length; wi++) {
      var wk = weeks[wi];
      if (wk.a !== null) {
        ts++;
        if (state[sk(mi, m.name, wi, "a", "att")]) ac++;
        if (state[sk(mi, m.name, wi, "a", "paid")]) pc++;
      }
      if (wk.b !== null) {
        ts++;
        if (state[sk(mi, m.name, wi, "b", "att")]) ac++;
        if (state[sk(mi, m.name, wi, "b", "paid")]) pc++;
      }
    }

    var ae = document.getElementById("ta-" + mi + "-" + memIdx);
    var pe = document.getElementById("tp-" + mi + "-" + memIdx);
    if (ae) ae.innerHTML = "&#10003; " + ac + "/" + ts;
    if (pe) pe.innerHTML = "&pound; " + pc + "/" + ts;
  }

  function handleTabClick(e) {
    var target = e.target;
    if (!target || !target.classList.contains("month-tab")) return;
    var idx = target.getAttribute("data-month");
    var tabs = document.querySelectorAll(".month-tab");
    var panels = document.querySelectorAll(".month-panel");
    for (var i = 0; i < tabs.length; i++) tabs[i].className = "month-tab";
    target.className = "month-tab active";
    for (var j = 0; j < panels.length; j++) {
      panels[j].className = panels[j].getAttribute("data-month") === idx ? "month-panel active" : "month-panel";
    }
  }

  function handleToggleClick(e) {
    var target = e.target;
    if (!target || !target.classList.contains("tog")) return;
    var key = target.getAttribute("data-key");
    var type = target.getAttribute("data-type");
    if (!key || !type) return;

    state[key] = !state[key];
    if (state[key]) {
      target.className = type === "att" ? "tog att-on" : "tog paid-on";
    } else {
      target.className = "tog";
    }

    var parts = key.split(".");
    var mi = parseInt(parts[0], 10);
    var name = parts[1];
    for (var i = 0; i < MEMBERS.length; i++) {
      if (MEMBERS[i].name === name) { updateTotals(mi, i); break; }
    }
    saveState();
  }

  function init() {
    var saved = loadState();
    buildTabs();
    buildPanels();
    if (saved) {
      for (var k in saved) {
        if (saved.hasOwnProperty(k) && state.hasOwnProperty(k)) {
          state[k] = saved[k];
        }
      }
    }
    applyStateToDOM();
    updateAllTotals();

    var tc = document.getElementById("month-tabs-container");
    if (tc) tc.addEventListener("click", handleTabClick, false);
    var pc = document.getElementById("panels-container");
    if (pc) pc.addEventListener("click", handleToggleClick, false);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init, false);
  } else {
    init();
  }
})();
</script>

</body>
</html>
